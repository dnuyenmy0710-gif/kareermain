<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế hoạch học tập | Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
        }

        .roadmap-view {
            min-height: 100vh;
            background: #f8f9fa;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .roadmap-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease;
        }

        .roadmap-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #111;
        }

        .roadmap-header p {
            color: #666;
            font-size: 1.1rem;
            max-width: 600px;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            padding: 0.8rem 1.5rem;
            background: #fff;
            color: #111;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        /* Filter Box */
        .filter-box {
            background: #fff;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            border: 1px solid #f0f0f0;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 250px;
        }

        .select-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        .select-group select {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 1rem;
            color: #111;
            outline: none;
            transition: all 0.3s ease;
            background: #fff;
            cursor: pointer;
        }

        .select-group select:focus {
            border-color: #111;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        .btn-black {
            background: #111;
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 48px;
        }

        .btn-black:hover {
            background: #333;
            transform: translateY(-2px);
        }

        /* Results Container */
        .roadmap-result {
            width: 100%;
            max-width: 800px;
        }

        .roadmap-step {
            background: #fff;
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
            animation: slideUp 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .step-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: #111;
            color: #fff;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
        }

        .roadmap-step h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #111;
        }

        .skill-list li {
            margin-bottom: 0.8rem;
            color: #444;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .skill-list li::before {
            content: '•';
            color: #111;
            font-weight: 900;
        }

        .coursera-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .coursera-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-color: #111;
        }

        .arrow-down {
            text-align: center;
            font-size: 2rem;
            color: #ddd;
            margin: 1rem 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .roadmap-view { padding: 2rem 1rem; }
            .roadmap-header h1 { font-size: 1.8rem; }
            .filter-box { padding: 1.5rem; gap: 1rem; }
            .select-group { min-width: 100%; }
            .roadmap-step { padding: 2rem; }
        }
    </style>
</head>

<body>
    <div class="roadmap-view">
        <a href="index.html" class="back-btn">← Quay lại Matrix</a>
        
        <header class="roadmap-header">
            <h1>Kế hoạch học tập</h1>
            <p id="career-subtitle">Tùy chỉnh hành trình phát triển cho nghề nghiệp của bạn.</p>
        </header>

        <div class="filter-box">
            <div class="select-group">
                <label>Vị trí hiện tại</label>
                <select id="start-level">
                    <option value="0">Sinh viên / Mới bắt đầu</option>
                    <option value="1">Chuyên viên (Junior)</option>
                    <option value="2">Chuyên viên Cao cấp (Senior)</option>
                </select>
            </div>
            <div class="select-group">
                <label>Mục tiêu hướng tới</label>
                <select id="end-level">
                    <option value="1">Chuyên viên (Junior)</option>
                    <option value="2">Chuyên viên Cao cấp (Senior)</option>
                    <option value="3" selected>Quản lý (Manager)</option>
                </select>
            </div>
            <button class="btn btn-black" onclick="generateRoadmap()">Tạo lộ trình</button>
        </div>

        <div id="roadmap-result" class="roadmap-result">
            <!-- Roadmap injected here -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const careerName = urlParams.get('career') || localStorage.getItem('selectedCareer') || 'Nghề nghiệp';
            document.getElementById('career-subtitle').innerHTML = `Tùy chỉnh hành trình phát triển cho <strong>${careerName}</strong>.`;
            document.title = `Kế hoạch học tập - ${careerName} | Matrix`;
            
            // Auto-generate on load
            generateRoadmap();
        });

        const transitionData = {
            "0-1": {
                badge: "Giai đoạn 1",
                title: "Trở thành Chuyên viên (Junior)",
                futureSkills: ["AI Literacy", "Data Analysis", "Digital Fluency"],
                skills: [
                    "Sử dụng thành thạo các công cụ chuyên ngành cơ bản",
                    "Tư duy phản biện và giải quyết vấn đề (Analytical Thinking)",
                    "Kỹ năng tự học và thích nghi (Lifelong Learning)",
                    "Hiểu quy trình làm việc Agile/Scrum cơ bản"
                ],
                courses: [
                    { provider: "Google", name: "Google Data Analytics Certificate", link: "https://grow.google/certificates/data-analytics/" },
                    { provider: "Coursera", name: "AI For Everyone (DeepLearning.AI)", link: "https://www.coursera.org/learn/ai-for-everyone" },
                    { provider: "Topica Native", name: "Tiếng Anh chuyên ngành cho Junior", link: "#" },
                    { provider: "Unica", name: "Kỹ năng tin học văn phòng nâng cao", link: "#" }
                ]
            },
            "1-2": {
                badge: "Giai đoạn 2",
                title: "Nâng cấp lên Chuyên viên Cao cấp (Senior)",
                futureSkills: ["Advanced AI Prompting", "Big Data Analytics", "Systems Thinking"],
                skills: [
                    "Tư duy hệ thống và thiết kế giải pháp phức tạp",
                    "Khả năng sáng tạo và đổi mới (Creative Thinking)",
                    "Kỹ năng hướng dẫn và đào tạo (Mentoring)",
                    "Quản lý dự án và tối ưu hóa hiệu suất"
                ],
                courses: [
                    { provider: "Google", name: "Google Advanced Data Analytics", link: "https://www.coursera.org/professional-certificates/google-advanced-data-analytics" },
                    { provider: "FPT Arena", name: "Thiết kế trải nghiệm người dùng nâng cao", link: "#" },
                    { provider: "Coursera", name: "Machine Learning Specialization", link: "https://www.coursera.org/specializations/machine-learning-introduction" },
                    { provider: "Bộ LĐ-TB&XH", name: "Chứng chỉ kỹ năng nghề quốc gia", link: "#" }
                ]
            },
            "2-3": {
                badge: "Giai đoạn 3",
                title: "Thăng tiến vị trí Quản lý (Manager)",
                futureSkills: ["AI Strategy for Business", "Digital Leadership", "Data Governance"],
                skills: [
                    "Nghệ thuật lãnh đạo và ảnh hưởng xã hội",
                    "Lập kế hoạch chiến lược và quản trị rủi ro",
                    "Trí tuệ cảm xúc và thấu cảm (Empathy)",
                    "Quản trị sự thay đổi trong kỷ nguyên số"
                ],
                courses: [
                    { provider: "Coursera", name: "Strategic Leadership and Management", link: "https://www.coursera.org/specializations/strategic-leadership" },
                    { provider: "Google", name: "Google Project Management Certificate", link: "https://grow.google/certificates/project-management/" },
                    { provider: "Wharton", name: "Digital Transformation Strategy", link: "#" },
                    { provider: "Topica", name: "Quản trị điều hành cao cấp (Executive MBA)", link: "#" }
                ]
            }
        };

        function generateRoadmap() {
            const start = parseInt(document.getElementById('start-level').value);
            const end = parseInt(document.getElementById('end-level').value);
            const resultContainer = document.getElementById('roadmap-result');

            if (start >= end) {
                resultContainer.innerHTML = `
                    <div style="text-align: center; padding: 3rem; background: #fff; border-radius: 16px; border: 1px solid #eee; border-left: 5px solid #ff4d4f;">
                        <h3 style="color: #d32f2f; margin-bottom: 0.5rem;">Lựa chọn không hợp lệ</h3>
                        <p style="color: #666;">Vui lòng chọn mục tiêu hướng tới cao hơn vị trí hiện tại của bạn.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            let delay = 0;

            for (let i = start; i < end; i++) {
                const stepKey = `${i}-${i + 1}`;
                const data = transitionData[stepKey];
                
                if (i > start) {
                    html += `<div class="arrow-down" style="animation: fadeIn 0.5s ease forwards; animation-delay: ${delay}s; opacity: 0;">↓</div>`;
                }

                html += `
                    <div class="roadmap-step" style="animation-delay: ${delay}s;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                            <div>
                                <div class="step-badge">${data.badge}</div>
                                <h2>${data.title}</h2>
                            </div>
                            <div style="text-align: right;">
                                <div style="display: flex; gap: 8px; margin-top: 5px; justify-content: flex-end; flex-wrap: wrap;">
                                    ${data.futureSkills.map(fs => `<span style="font-size: 0.65rem; padding: 6px 12px; background: #f5f5f5; color: #444; border-radius: 50px; font-weight: 700; border: 1px solid #e0e0e0; display: inline-block; text-transform: uppercase; letter-spacing: 0.02em;">${fs}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        
                        <div class="step-content" style="display: flex; flex-direction: column; gap: 2rem;">
                            <div class="skill-list">
                                <h3 style="border-bottom: 1px solid #eee; padding-bottom: 0.5rem;">Kỹ năng nền tảng</h3>
                                <ul style="margin-top: 1rem;">
                                    ${data.skills.map(skill => `<li>${skill}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="course-list">
                                <h3 style="border-bottom: 1px solid #eee; padding-bottom: 0.5rem;">Lộ trình đào tạo đề xuất</h3>
                                <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 1.2rem; position: relative;">
                                    ${data.courses.map((course, idx) => {
                                        const levels = ["Cơ bản", "Nền tảng", "Trung cấp", "Nâng cao"];
                                        const level = levels[idx] || "Chuyên sâu";
                                        const palette = ["#DCD1C7", "#616F84", "#917E71", "#685C54"];
                                        const levelColor = palette[idx] || "#685C54";
                                        
                                        return `
                                            <a href="${course.link}" target="_blank" class="coursera-card" style="padding: 1.2rem; margin-bottom: 0; display: flex; flex-direction: row; align-items: center; gap: 15px; border-left: 5px solid ${levelColor};">
                                                <div style="min-width: 90px; text-align: center;">
                                                    <span style="font-size: 0.65rem; font-weight: 800; background: ${levelColor}; color: ${idx === 0 ? '#4E4034' : '#fff'}; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; display: inline-block; letter-spacing: 0.05em;">${level}</span>
                                                </div>
                                                <div style="flex: 1;">
                                                    <span class="coursera-logo" style="color: ${levelColor}; font-size: 0.7rem; font-weight: 800; margin-bottom: 2px; display: block; opacity: 0.8;">${course.provider}</span>
                                                    <span class="coursera-title" style="font-size: 1rem; margin: 0; color: #111;">${course.name}</span>
                                                </div>
                                            </a>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                delay += 0.2;
            }

            resultContainer.innerHTML = html;
        }
    </script>
</body>

</html>
